version: 2

models:
  - name: stg_orders
    description: "Cleaned orders. One row per order."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'invoiced',
                         'processing', 'approved', 'unavailable', 'created']
      - name: delivery_time_days
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 365
                row_condition: "is_delivered = true"

  - name: stg_customers
    description: "Cleaned customers. customer_id is order-scoped."
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null

  - name: stg_order_items
    description: "One row per item per order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: item_price
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: total_item_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: stg_products
    description: "Product catalog with English category translation."
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_payments
    description: "Payment records per order."
    columns:
      - name: order_id
        tests:
          - not_null
      - name: payment_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
