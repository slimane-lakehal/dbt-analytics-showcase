version: 2

sources:
  - name: olist
    description: >
      Brazilian e-commerce dataset from Olist (Kaggle).
      ~100k orders placed between 2016-2018.
      https://www.kaggle.com/datasets/olistbr/brazilian-ecommerce
    schema: main
    tables:
      - name: orders
        identifier: olist_orders_dataset
        description: One row per order. Central table of the dataset.
        columns:
          - name: order_id
            description: Unique identifier for the order.
            tests:
              - unique
              - not_null
          - name: customer_id
            tests:
              - not_null
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['delivered', 'shipped', 'canceled', 'invoiced',
                             'processing', 'approved', 'unavailable', 'created']
          - name: order_purchase_timestamp
            tests:
              - not_null

      - name: customers
        identifier: olist_customers_dataset
        description: One row per customer. customer_id is unique per order.
        columns:
          - name: customer_id
            tests:
              - unique
              - not_null
          - name: customer_unique_id
            tests:
              - not_null

      - name: order_items
        identifier: olist_order_items_dataset
        description: One row per item within an order.
        columns:
          - name: order_id
            tests:
              - not_null
          - name: order_item_id
            tests:
              - not_null

      - name: products
        identifier: olist_products_dataset
        description: One row per product.
        columns:
          - name: product_id
            tests:
              - unique
              - not_null

      - name: payments
        identifier: olist_order_payments_dataset
        description: One row per payment installment.
        columns:
          - name: order_id
            tests:
              - not_null

      - name: sellers
        identifier: olist_sellers_dataset
        columns:
          - name: seller_id
            tests:
              - unique
              - not_null

      - name: category_translation
        identifier: product_category_name_translation
        description: Portuguese → English category name translation.
