version: 2

models:
  - name: dim_customers
    description: >
      Customer dimension table. One row per unique customer.
      Includes lifetime metrics and customer segmentation.
    columns:
      - name: customer_key
        description: Surrogate key (MD5 hash of customer_unique_id).
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - unique
          - not_null
      - name: lifetime_order_count
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: lifetime_revenue
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: customer_segment
        tests:
          - accepted_values:
              arguments:
                values: ['VIP', 'Regular', 'Occasional']

  - name: fct_orders
    description: >
      Fact table. One row per order.
      Central table for all revenue and operational reporting.
    columns:
      - name: order_key
        tests:
          - unique
          - not_null
      - name: order_id
        tests:
          - unique
          - not_null
      - name: total_order_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: item_count
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: order_status
        tests:
          - not_null
